test:
  runs-on: ubuntu-latest
  steps:
    - name: Install packages
      run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libsqlite3-dev libvips

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        bundler-cache: true

    - name: Setup database
      env:
        RAILS_ENV: test
      run: |
        bundle exec rails db:create
        bundle exec rails db:schema:load

    - name: Run RSpec
      env:
        RAILS_ENV: test
      run: bundle exec rspec --format progress

    - name: Run Rails tests
      env:
        RAILS_ENV: test
      run: bundle exec rails test
