services:
  - type: web
    name: logcell
    runtime: ruby
    plan: free
    buildCommand: |
      gem install bundler
      bundle install
      bundle exec rails assets:precompile
      bundle exec rails db:migrate
    startCommand: bundle exec rails server -p $PORT -b 0.0.0.0
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: true
      - key: RAILS_SERVE_STATIC_FILES
        value: true
      - key: RAILS_MASTER_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: ADMIN_NAME
        value: Administrador
      - key: ADMIN_DOC
        value: "000.000.000-00"
    disk:
      name: logcell-storage
      mountPath: /app/storage
      sizeGB: 1
